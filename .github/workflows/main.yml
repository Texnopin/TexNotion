name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install buildozer and cython
      run: |
        pip install buildozer
        pip install cython

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget

    - name: Set up Android SDK in the correct structure (cmdline-tools/latest)
      run: |
        # Создаём папку SDK в стандартном месте Buildozer
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        
        # Скачиваем commandlinetools
        cd ~/.buildozer/android/platform/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip -d cmdline-tools
        mv cmdline-tools/cmdline-tools cmdline-tools/latest
        rm -f commandlinetools-linux-11076708_latest.zip
        
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        
        # Путь к sdkmanager
        SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
        chmod +x $SDKMANAGER
        
        # Принимаем лицензии
        yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
        
        # Устанавливаем компоненты
        $SDKMANAGER "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
        # Добавляем в PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/build-tools/30.0.3" >> $GITHUB_PATH
        
        cd $GITHUB_WORKSPACE

    - name: Build APK
      run: |
        unset ANDROID_NDK ANDROID_NDK_HOME ANDROID_NDK_ROOT
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-notion-app
        path: bin/*.apk
