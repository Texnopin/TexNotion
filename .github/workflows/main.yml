name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install buildozer and cython
      run: |
        pip install buildozer
        pip install cython

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget

    - name: Set up Android SDK
      run: |
        # Создаём корневую папку SDK в ожидаемом Buildozer месте
        SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_ROOT
        
        # Скачиваем commandlinetools
        cd $GITHUB_WORKSPACE
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip -d cmdline-tools
        
        # Создаём структуру cmdline-tools/latest внутри SDK_ROOT (для новых утилит)
        mkdir -p $SDK_ROOT/cmdline-tools
        mv cmdline-tools/cmdline-tools $SDK_ROOT/cmdline-tools/latest
        
        # Создаём симлинк для старой структуры tools/bin (ожидает Buildozer)
        ln -s $SDK_ROOT/cmdline-tools/latest $SDK_ROOT/tools
        
        export ANDROID_SDK_ROOT=$SDK_ROOT
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        
        # Делаем исполняемыми
        chmod +x $SDK_ROOT/tools/bin/sdkmanager
        chmod +x $SDK_ROOT/tools/bin/avdmanager
        
        # Принимаем лицензии
        yes | $SDK_ROOT/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        
        # Устанавливаем компоненты
        $SDK_ROOT/tools/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
        # Добавляем в PATH
        echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH
        echo "$SDK_ROOT/build-tools/30.0.3" >> $GITHUB_PATH
        
        # Очистка
        cd $GITHUB_WORKSPACE
        rm -rf cmdline-tools commandlinetools-linux-11076708_latest.zip

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-notion-app
        path: bin/*.apk
