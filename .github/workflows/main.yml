name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install buildozer
      run: pip install buildozer

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: Build APK
      run: |
        buildozer init
        # Настроим buildozer.spec для webview
        sed -i 's/#bootstrap = webview/bootstrap = webview/' buildozer.spec
        sed -i 's/#requirements = python3,kivy/requirements = python3,flask,rank-bm25/' buildozer.spec
        sed -i 's/#android.permissions = INTERNET/android.permissions = INTERNET/' buildozer.spec
        sed -i 's/#source.include_exts = py,png,jpg,kv,atlas/&,html,css,js,json/' buildozer.spec
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-notion-app
        path: bin/*.apk
