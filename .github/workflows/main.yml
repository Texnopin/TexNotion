name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install buildozer and cython
      run: |
        pip install buildozer
        pip install cython

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget

    - name: Set up Android SDK and accept licenses
      run: |
        # Скачиваем командную строку инструментов
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip -d cmdline-tools

        # Создаём структуру каталогов Android SDK
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
        rm -rf cmdline-tools

        export ANDROID_SDK_ROOT=$GITHUB_WORKSPACE/android-sdk
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

        # Делаем исполняемыми
        chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
        chmod +x $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager

        # Принимаем все лицензии (автоматически, подавляем вывод)
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

        # Устанавливаем необходимые компоненты (платформа и build-tools)
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"

        # Дополнительно устанавливаем build-tools 37 (чтобы избежать ошибки лицензии, если Buildozer запросит)
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;37.0.0" > /dev/null 2>&1 || true

        # Добавляем в PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/build-tools/30.0.3" >> $GITHUB_PATH

        # Копируем наш SDK в папку, где Buildozer ожидает его найти
        mkdir -p ~/.buildozer/android/platform
        cp -r android-sdk ~/.buildozer/android/platform/android-sdk

    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$GITHUB_WORKSPACE/android-sdk
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-notion-app
        path: bin/*.apk
