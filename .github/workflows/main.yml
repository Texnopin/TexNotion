name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install buildozer and cython
      run: |
        pip install buildozer
        pip install cython

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

    - name: Set up Android SDK and accept licenses
      run: |
        # Устанавливаем sdkmanager через командную строку
        sudo apt install -y wget
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip -d cmdline-tools
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_SDK_ROOT=$GITHUB_WORKSPACE/android-sdk
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # Принимаем все лицензии
        yes | sdkmanager --licenses || true
        
        # Устанавливаем необходимые компоненты (API 30, build-tools)
        sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
        
        # Проверяем, что aidl появился
        ls -la $ANDROID_SDK_ROOT/build-tools/30.0.3/

    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$GITHUB_WORKSPACE/android-sdk
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-notion-app
        path: bin/*.apk
